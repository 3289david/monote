version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: monote_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: monote_db
      POSTGRES_USER: monote
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - monote_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monote -d monote_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: monote_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://monote:${DB_PASSWORD}@db:5432/monote_db
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      UPLOAD_DIR: /app/public/uploads
      PORT: 3000
    volumes:
      - uploads_data:/app/public/uploads
    networks:
      - monote_net
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    container_name: monote_nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_data:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
      - uploads_data:/var/www/uploads:ro
    networks:
      - monote_net

  certbot:
    image: certbot/certbot
    container_name: monote_certbot
    volumes:
      - certbot_data:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    profiles:
      - ssl
    command: certonly --webroot --webroot-path=/var/www/certbot --email ${CERTBOT_EMAIL} --agree-tos --no-eff-email -d ${DOMAIN}

volumes:
  postgres_data:
  uploads_data:
  certbot_data:
  certbot_certs:

networks:
  monote_net:
    driver: bridge
